# HYDRA nginx config — /etc/nginx/sites-available/hydra
#
# 구조: 단일 도메인 경로 라우팅
#   /api/*  → FastAPI (127.0.0.1:8000)
#   /       → React SPA (/var/www/hydra)
#
# certbot --nginx 가 listen 443 ssl 관련 지시어를 별도로 추가/수정함. 이 파일은
# 그 이후에도 안전하게 재배포 가능하도록 certbot 이 관리하는 블록은 건드리지 않음.
# deploy.sh 가 설치 전 기존 파일과 diff 해서 certbot 추가분을 보존.

server {
    listen 80;
    listen [::]:80;
    server_name hydra-prod.duckdns.org;

    # certbot HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 80 → 443 리다이렉트 (certbot 이 원래 넣지만 명시)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hydra-prod.duckdns.org;

    # TLS — certbot 이 관리 (ssl_certificate / ssl_certificate_key 는 certbot 추가)
    ssl_certificate /etc/letsencrypt/live/hydra-prod.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hydra-prod.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 보안 헤더
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # healthz — 모니터링/헬스체크용
    location = /healthz {
        return 200 "hydra-prod ok\n";
        add_header Content-Type text/plain;
    }

    # API → FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # 본문 크기 여유 (대규모 bulk import 대비)
        client_max_body_size 10M;
    }

    # FastAPI 에서 직접 서빙하는 정적/템플릿 경로
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
    }

    # SPA (React) — 모든 경로는 index.html 로 fallback (TanStack Router client routing)
    root /var/www/hydra;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # SPA 자산 — 장기 캐시 (빌드 해시 파일명 가정)
    location ~* \.(js|css|png|jpg|jpeg|svg|woff2?|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
