# HYDRA staging nginx config — /etc/nginx/sites-available/hydra-staging
#
# Usage:
#   1) DNS: hydra-stg-prod.duckdns.org → 158.247.232.101 (or different staging server)
#   2) certbot: certbot --nginx -d hydra-stg-prod.duckdns.org
#   3) deploy: hydra-server-staging on port 8001 (separate systemd unit)
#   4) DB:    a separate PostgreSQL database 'hydra_staging' (created with same schema)
#
# This is the same shape as nginx-hydra.conf but with staging server_name + ports.
#
# Strategy: staging shares the same VPS but isolates data via:
#   - Different DB (DATABASE_URL=postgresql:.../hydra_staging)
#   - Different .env file (/opt/hydra-staging/.env)
#   - Different systemd unit (hydra-server-staging on :8001)
#   - Different frontend dist (/var/www/hydra-staging)
#   - Different AdsPower group (no profile sharing with prod)

server {
    listen 80;
    listen [::]:80;
    server_name hydra-stg-prod.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hydra-stg-prod.duckdns.org;

    # certbot 이 추가
    ssl_certificate /etc/letsencrypt/live/hydra-stg-prod.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hydra-stg-prod.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 보안 헤더
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 환경 식별 헤더 — 클라이언트가 prod/staging 구분 가능
    add_header X-Hydra-Env "staging" always;

    location = /healthz {
        return 200 "hydra-staging ok\n";
        add_header Content-Type text/plain;
    }

    # API → FastAPI on :8001 (staging)
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Hydra-Env "staging";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10M;
    }

    location ~ ^/(settings|accounts|brands|campaigns|keywords|videos|pools|logs|system|export|creator|recovery|presets|profile_locks|version|workers|tasks|ai|ws)/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_cache_valid 200 1h;
    }

    root /var/www/hydra-staging;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|svg|woff2?|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
